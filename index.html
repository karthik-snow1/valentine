<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    /* This adds the wallpaper */
    background: linear-gradient(rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.6)), 
                url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=2070&auto=format&fit=crop');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    font-family: 'Arial', sans-serif;
    text-align: center;
}

        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 75, 110, 0.2);
        }

        h1 { color: #ff4b6e; margin-bottom: 20px; }
        
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #yesBtn { background-color: #ff4b6e; color: white; }
        
        #noBtn {
            background-color: #6c757d;
            color: white;
            position: relative;
        }

        img { width: 200px; border-radius: 10px; }
        .love-letter {
    max-width: 600px;
    margin: 50px auto;
    padding: 40px;
    /* This creates a romantic glass effect instead of solid white */
    background: rgba(255, 255, 255, 0.2); 
    backdrop-filter: blur(10px); /* This blurs the wallpaper behind the letter */
    -webkit-backdrop-filter: blur(10px);
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 8px 32px 0 rgba(255, 75, 110, 0.2);
    line-height: 1.6;
    text-align: left;
    display: none; /* Keeps it hidden until Yes is clicked */
}
    .gallery {
    position: relative;
    width: 320px;   /* Set a specific width */
    height: 400px;  /* Set a specific height */
    margin: 20px auto;
    display: none;  /* Hidden until the button is clicked */
    overflow: hidden;
    border-radius: 15px;
}

.gallery img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 15px;
    opacity: 0; /* All start invisible */
    transition: opacity 1s ease-in-out; /* This creates the "sliding" fade effect */
}

.gallery img {
    position: absolute;
    top: 0; 
    left: 0;
    width: 100%; 
    height: 100%;
    object-fit: cover;
    border-radius: 15px;
    opacity: 0; /* Keeps them hidden */
    transition: opacity 1s ease-in-out; /* The sliding fade effect */
}

.gallery img.active {
     opacity: 1; /* Shows only the current photo */
}
    #envelope-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #ff4b6e;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    cursor: pointer;
    transition: transform 0.8s ease-in-out;
}

.envelope {
    width: 200px;
    height: 150px;
    background: white;
    position: relative;
    border-radius: 5px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.envelope::before {
    content: "✉️";
    font-size: 50px;
}

.text-tap {
    position: absolute;
    bottom: -40px;
    color: white;
    font-weight: bold;
    animation: blink 1.5s infinite;
}

@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
}
.heart-float {
    position: fixed;
    bottom: -10px;
    font-size: 20px;
    color: #ff0000;
    user-select: none;
    pointer-events: none;
    animation: floatUp 4s linear infinite;
}

@keyframes floatUp {
    to {
        transform: translateY(-100vh) rotate(360deg);
        opacity: 0;
    }
}.flower {
    position: fixed;
    bottom: 0;
    font-size: 30px;
    z-index: 1001;
    transition: all 2s ease-out;
    user-select: none;
}

@keyframes bloom {
    0% { transform: scale(0) translateY(0); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: scale(1.2) translateY(-100px); }
}
.next-btn {
    display: block;
    margin: 30px auto;
    background-color: #ff4b6e; /* Romantic Red */
    color: white;
    border: none;
    padding: 15px 30px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
    font-size: 1.1rem;
    /* This adds a glowing heart-colored shadow */
    box-shadow: 0 0 20px rgba(255, 75, 110, 0.6); 
    transition: all 0.3s ease;
    font-family: 'Arial', sans-serif;
}

.next-btn:hover {
    transform: scale(1.1);
    background-color: #ff3356; /* Darker red on hover */
    box-shadow: 0 0 30px rgba(255, 75, 110, 0.9);
}
@keyframes heartPulse {
    0% { box-shadow: 0 0 10px rgba(255, 75, 110, 0.4); }
    50% { box-shadow: 0 0 25px rgba(255, 75, 110, 0.8); }
    100% { box-shadow: 0 0 10px rgba(255, 75, 110, 0.4); }
}

/* Add this line inside your .next-btn block above */
.next-btn {
    animation: heartPulse 2s infinite;
}
.corner-heart {
    position: absolute; /* Pins them to the corners of the letter */
    font-size: 1.2rem;
    filter: drop-shadow(0 0 5px rgba(255, 75, 110, 0.5));
    opacity: 0.8;
}

.top-left { top: 10px; left: 10px; }
.top-right { top: 10px; right: 10px; }
.bottom-left { bottom: 10px; left: 10px; }
.bottom-right { bottom: 10px; right: 10px; }

/* Crucial: This ensures the hearts stay INSIDE the glass letter */
.love-letter {
    position: relative; 
}
/* Line 229 */
.gift-choice {
    background: rgba(255, 255, 255, 0.2);
    padding: 15px;
    border-radius: 15px;
    border: 2px solid #ff4b6e;
    transition: transform 0.3s ease;
    width: 100px;
}

.gift-choice:hover {
    transform: scale(1.1);
    box-shadow: 0 0 15px rgba(255, 75, 110, 0.5);
}

.bouquet-img {
    width: 250px;
    border-radius: 15px;
    animation: bloom 2s ease-out;
}
/* Styling for the notes beside the image */
.notes-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 30px; /* Space between notes and flowers */
    padding: 20px;
    flex-wrap: wrap; /* Helps with mobile viewing */
}

.side-notes {
    display: flex;
    flex-direction: column;
    gap: 40px;
    max-width: 150px;
}

.note-bubble {
    background: rgba(255, 255, 255, 0.9); /* Slight transparency for that glass look */
    padding: 12px 18px;
    border-radius: 20px;
    border: 2px solid #ff85a1; /* Soft pink border */
    font-size: 0.9rem;
    font-weight: 500;
    color: #d63384; /* Deep romantic pink text */
    box-shadow: 0 5px 15px rgba(255, 133, 161, 0.3);
    position: relative;
    animation: floatBubble 3s ease-in-out infinite; /* Gentle movement */
}

/* This makes the bubbles drift up and down slightly */
@keyframes floatBubble {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

/* Stagger the animation so they don't move at the same time */
.side-notes div:nth-child(2) {
    animation-delay: 1.5s;
}</style>
</head>
<body>

    <script>
        function openEnvelope() {
        new Audio('opening-envelope.mp3').play();
        const wrapper = document.getElementById('envelope-wrapper');
        wrapper.style.transform = 'translateY(-100%)';
        setTimeout(() => {
            wrapper.style.display = 'none';
        }, 800);
    }

    function moveButton() {
        const noBtn = document.getElementById('noBtn');
        const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
        const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
        noBtn.style.position = 'absolute';
        noBtn.style.left = x + 'px';
        noBtn.style.top = y + 'px';
    }
        function growFlowers() {
    const flowerEmojis = ['🌸', '🌹', '🌷', '🌻', '🌼'];
    for (let i = 0; i < 15; i++) {
        setTimeout(() => {
            const flower = document.createElement('div');
            flower.className = 'flower';
            flower.innerHTML = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
            flower.style.left = Math.random() * 100 + 'vw';
            flower.style.animation = 'bloom 2s forwards';
            document.body.appendChild(flower);
        }, i * 200);
    }
}
       let currentPhotoIndex = 0;

function startSlideshow() {
    const images = document.querySelectorAll('.gallery img');
    let currentPhotoIndex = 0;
    images[0].classList.add('active');

    const slideInterval = setInterval(() => {
        images[currentPhotoIndex].classList.remove('active');
        currentPhotoIndex++;

        // Logic check: Did we finish all the photos?
        if (currentPhotoIndex >= images.length) {
            clearInterval(slideInterval); // Stop the sliding timer
            document.getElementById('gallerySection').style.display = 'none'; // Hide the gallery
            document.getElementById('giftContainer').style.display = 'block'; // Reveal the gift!
            return;
        }

        images[currentPhotoIndex].classList.add('active');
    }, 3000); // This waits 3 seconds per photo
}
function startLoveCounter() {
    // Set this to the date you two first started talking or met
    const startDate = new Date("2025-10-15T00:00:00"); 
    
    setInterval(() => {
        const now = new Date();
        const diff = now - startDate;

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / 1000 / 60) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        const counterElement = document.getElementById('counter');
        if (counterElement) {
            counterElement.innerHTML = `We've been together for: ${days}d ${hours}h ${minutes}m ${seconds}s`;
        }
    }, 1000);
}   function showMemories() {
    // 1. Hide everything from the first 'page'
    document.getElementById('letterSection').style.display = 'none';

    // 2. Show the photo slideshow page
    const gallery = document.getElementById('gallerySection');
    gallery.style.display = 'block'; // Make sure this matches your CSS
    
    // 3. Start the sliding animation
    startSlideshow(); 
}
